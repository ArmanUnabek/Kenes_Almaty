services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: os_journal
      MYSQL_USER: os_user
      MYSQL_PASSWORD: change_me
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./deploy_database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database_indexes_performance.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uos_user", "-pchange_me"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: os_journal
      DB_USER: os_user
      DB_PASS: change_me
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql mbstring fileinfo &&
      a2enmod rewrite &&
      apache2-foreground"

  cron:
    image: php:8.2-cli
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: os_journal
      DB_USER: os_user
      DB_PASS: change_me
    entrypoint: ["/bin/sh", "-c", "while true; do php /var/www/html/cron_deadlines.php; sleep 3600; done"]

volumes:
  db_data:
